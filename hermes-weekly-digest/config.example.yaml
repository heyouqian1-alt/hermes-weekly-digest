# Hermes Weekly Digest 配置文件
# 复制为 config.yaml 并根据你的环境修改

# --- Hermes Profiles 目录 ---
# Windows: C:\\Users\\你的用户名\\AppData\\Local\\hermes\\profiles
# Linux/macOS: ~/.hermes/profiles
profiles_dir: "~/.hermes/profiles"

# 桌面路径（报告文件保存位置）
desktop_dir: "~/Desktop"

# 缓存目录（state.json + 纹理缓存）
cache_dir: ".digest_cache"

# 周几触发（0=周一，1=周二...）
weekday: 0

# --- Profile 显示名映射（可选）---
# 如果不配置，报告里会用 profile 目录名
profile_info:
  analyst-profile:
    role: "金融分析师"
    model: "your-model-name"
    platform: "QQ Bot"
  helper-profile:
    role: "全能助手"
    model: "your-model-name"
    platform: "WeChat+QQ+Feishu"
  tech-profile:
    role: "技术经理"
    model: "your-model-name"
    platform: "CLI"

# --- 要扫描的 profile 列表（可选）---
# 不配置或为空时自动发现所有 profile
profiles:
  # - analyst-profile
  # - helper-profile
  # - tech-profile
